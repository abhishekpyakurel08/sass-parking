name: Multi-Tenant Parking SaaS CI/CD Pipeline

on:
  push:
    branches: [ main ] # Triggers automatically when code is merged into main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Remote SSH Connection & Deploy App
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}         # Your server's public IP address
        username: ${{ secrets.SERVER_USER }}     # Your server's SSH login user (e.g., ubuntu, root)
        key: ${{ secrets.SERVER_SSH_KEY }}       # Your private SSH key string
        port: 22
        script: |
          # 1. Navigate to the backend directory
          cd /home/socialworker/sass-parking/backend

          # 2. Pull the newest updates from GitHub
          git pull origin main

          # 3. Build the fresh production image using your multi-stage Dockerfile
          docker build -t parking-saas-backend:latest .

          # 4. Safely stop and destroy the old running container if it exists
          docker rm -f saas-backend-container || true

          # 5. Spin up the new container with production environment flags bound to it
          docker run -d \
            --name saas-backend-container \
            -p 5000:5000 \
            --env-file .env \
            --restart always \
            parking-saas-backend:latest

          # 6. Clean up old dangling Docker build layers to preserve server storage space
          docker image prune -f