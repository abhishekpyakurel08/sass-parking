services:
  # Local MongoDB database (optional, fallback if not using MongoDB Atlas)
  db:
    image: mongo:6
    container_name: parksass-db
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - coolify

  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parksass-backend
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.parksass-backend.rule=Host(`parking-backend.tecobit.cloud`)"
      - "traefik.http.routers.parksass-backend.entrypoints=https"
      - "traefik.http.routers.parksass-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.parksass-backend.loadbalancer.server.port=5000"

  # Frontend single-page application served via Nginx
  frontend:
    build:
      context: ./sass-parking-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://parking-backend.tecobit.cloud
    container_name: parksass-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.parksass-frontend.rule=Host(`parking-frontend.tecobit.cloud`)"
      - "traefik.http.routers.parksass-frontend.entrypoints=https"
      - "traefik.http.routers.parksass-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.parksass-frontend.loadbalancer.server.port=80"

volumes:
  mongo-data:

# Explicitly declare the external root network for Coolify
networks:
  coolify:
    external: true
