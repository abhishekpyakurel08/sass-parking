version: '3.9'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: parksaas_api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/sass_parking_db
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ACCESS_TOKEN_EXPIRES=15m
      - REFRESH_TOKEN_EXPIRES=7d
      - BCRYPT_ROUNDS=12
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - INITIAL_SUPERADMIN_EMAIL=${INITIAL_SUPERADMIN_EMAIL}
      - INITIAL_SUPERADMIN_PASSWORD=${INITIAL_SUPERADMIN_PASSWORD}
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - parksaas_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7.0
    container_name: parksaas_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - parksaas_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:latest
    container_name: parksaas_mongo_ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - parksaas_net
    profiles:
      - dev

volumes:
  mongo_data:
  mongo_config:

networks:
  parksaas_net:
    driver: bridge
